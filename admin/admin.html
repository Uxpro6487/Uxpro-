
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UXPRO Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#07090e;
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logo{
font-size:28px;
font-weight:700;
color:#10b981;
}

.logout{
background:#ef4444;
border:none;
padding:10px 18px;
color:white;
border-radius:10px;
cursor:pointer;
}

.card{
background:#111827;
padding:25px;
border-radius:20px;
border:1px solid #1f2937;
margin-bottom:25px;
}

.card h2{
margin-bottom:20px;
color:#10b981;
}

.input-group{
margin-bottom:18px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-size:14px;
}

.input-group input,
.input-group select{
width:100%;
padding:12px;
background:#1f2937;
border:none;
border-radius:10px;
color:white;
}

.preview{
width:100%;
height:250px;
border:2px dashed #10b981;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
margin-top:15px;
}

.preview img{
width:100%;
height:100%;
object-fit:cover;
display:none;
}

button.upload{
width:100%;
padding:15px;
background:#10b981;
color:black;
font-weight:bold;
font-size:16px;
border:none;
border-radius:12px;
cursor:pointer;
margin-top:20px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
margin-top:30px;
}

.wallpaper{
background:#111827;
border-radius:15px;
overflow:hidden;
}

.wallpaper img{
width:100%;
height:180px;
object-fit:cover;
}

.wallpaper .info{
padding:15px;
}

.wallpaper .info h3{
font-size:16px;
margin-bottom:10px;
}

.actions{
display:flex;
gap:10px;
}

.actions button{
flex:1;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.edit{
background:#3b82f6;
color:white;
}

.delete{
background:#ef4444;
color:white;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="logo">
UXPRO ADMIN
</div>

<button class="logout">
Logout
</button>

</div>

<div class="card">

<h2>Upload Wallpaper</h2>

<div class="input-group">
<label>Wallpaper Name</label>
<input
type="text"
id="wallpaperName"
placeholder="Wallpaper Name">
</div>

<div class="input-group">
<label>Category</label>

<select id="category">

<option>Nature</option>
<option>Cars</option>
<option>Anime</option>
<option>Gaming</option>
<option>Technology</option>
<option>Abstract</option>

</select>

</div>

<div class="input-group">

<label>Select Image</label>

<input
type="file"
id="imageInput"
accept="image/*">

</div>

<div class="preview">

<img id="previewImage">

<span id="previewText">
Image Preview
</span>

</div>

<button class="upload">
Upload Wallpaper
</button>

</div>

<h2 style="margin-bottom:20px;">
Uploaded Wallpapers
</h2>

<div class="gallery" id="gallery">

</div>

</div>

<script>

const imageInput=document.getElementById("imageInput");

const preview=document.getElementById("previewImage");

const previewText=document.getElementById("previewText");

imageInput.onchange=function(){

const file=this.files[0];

if(!file) return;

preview.src=URL.createObjectURL(file);

preview.style.display="block";

previewText.style.display="none";

}

</script>

</body>
</html>
